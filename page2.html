<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vichuve ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Arial',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff4d88,#ff80bf,#ffd6e8);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
}

/* 🎂 Birthday Text */
#birthdayText{
position:absolute;
font-weight:bold;
color:white;
text-align:center;
text-shadow:0 0 20px #fff, 0 0 40px #ff69b4;
font-size:40px;
animation:introZoom 5s forwards;
z-index:100;
}

@keyframes introZoom {
0% { transform: scale(0.6); opacity: 0; }
30% { transform: scale(1.1); opacity: 1; }
70% { transform: scale(1); }
100% { transform: scale(1); top: 25px; font-size: 45px; }
}

/* ❤️ Floating Hearts */
.heart{
position:absolute;
font-size:30px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* 🎁 Floating Gifts */
.gift{
position:absolute;
font-size:30px;
animation:giftFloat linear infinite;
}

@keyframes giftFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh) rotate(360deg);opacity:0;}
}

/* ✨ Sparkles */
.sparkle{
position:absolute;
font-size:25px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.3;}
50%{opacity:1;}
}

/* 💌 Message */
.message{
margin-top:120px;
padding:20px;
text-align:center;
font-size:24px;
color:white;
max-width:90%;
text-shadow:0 0 10px black;
}

/* ➜ Next Button */
.next-btn{
position:absolute;
bottom:40px;
padding:15px 35px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:50px;
background:white;
color:#ff1493;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,0.8);
opacity:0;
animation:showButton 6s forwards;
}

.next-btn:hover{
transform:scale(1.1);
transition:0.3s;
}

@keyframes showButton{
0%{opacity:0;}
80%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- 🎂 TEXT -->
<div id="birthdayText">
🎂 Happy birthday Vichuve 🥹💋🫂
</div>

<!-- ❤️ Hearts -->
<div class="heart" style="left:5%;animation-duration:7s;">❤️</div>
<div class="heart" style="left:15%;animation-duration:9s;">💖</div>
<div class="heart" style="left:25%;animation-duration:8s;">💕</div>
<div class="heart" style="left:35%;animation-duration:10s;">❤️</div>
<div class="heart" style="left:45%;animation-duration:6s;">💖</div>
<div class="heart" style="left:55%;animation-duration:8s;">💕</div>
<div class="heart" style="left:65%;animation-duration:9s;">❤️</div>
<div class="heart" style="left:75%;animation-duration:7s;">💖</div>
<div class="heart" style="left:85%;animation-duration:10s;">💕</div>

<!-- 🎁 Gifts -->
<div class="gift" style="left:10%;animation-duration:9s;">🎁</div>
<div class="gift" style="left:20%;animation-duration:7s;">🎀</div>
<div class="gift" style="left:30%;animation-duration:10s;">🎁</div>
<div class="gift" style="left:40%;animation-duration:8s;">🎉</div>
<div class="gift" style="left:50%;animation-duration:11s;">🎁</div>
<div class="gift" style="left:60%;animation-duration:7s;">🎀</div>
<div class="gift" style="left:70%;animation-duration:9s;">🎁</div>
<div class="gift" style="left:80%;animation-duration:8s;">🎉</div>

<!-- ✨ Sparkles -->
<div class="sparkle" style="top:10%;left:15%;">✨</div>
<div class="sparkle" style="top:20%;left:80%;">✨</div>
<div class="sparkle" style="top:35%;left:30%;">✨</div>
<div class="sparkle" style="top:60%;left:70%;">✨</div>
<div class="sparkle" style="top:80%;left:20%;">✨</div>

<!-- 💌 MESSAGE -->
<div class="message">
💖 You are the most beautiful gift in my life. 💖
<br><br>
May your day be filled with happiness, smiles, love and endless joy. ❤️
</div>

<!-- ➜ NEXT -->
<button class="next-btn" onclick="window.location.href='page3.html'">
Next Surprise ➜
</button>

<!-- 🎵 MUSIC SCRIPT -->
<script>
window.addEventListener("load", () => {
  const music = document.getElementById("bgmusic");

  music.play().catch(() => {
    document.addEventListener("click", () => music.play(), { once: true });
  });

  localStorage.setItem("musicPlaying", "true");
});
</script>

</body>
</html>
