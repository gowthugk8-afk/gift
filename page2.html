<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vichuve ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Dancing Script', cursive;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background: radial-gradient(circle at top,#ff4d88,#ff80bf,#ffd6e8);
position:relative;
}

/* ✨ BACKGROUND LIGHTS */
.light{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
opacity:0.6;
animation:floatLight linear infinite;
box-shadow:0 0 15px white;
}

@keyframes floatLight{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* 🎂 TITLE */
#birthdayText{
position:absolute;
top:20px;
text-align:center;
color:white;
font-size:52px;
font-weight:700;
text-shadow:0 0 15px #fff, 0 0 35px #ff1493;
animation:fadeIn 2s ease-in-out;
z-index:10;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1; transform:translateY(0);}
}

/* 💌 QUOTE (FIXED POSITION - MOVED DOWN) */
.quote-box{
position:absolute;
top:180px;   /* ✅ moved further down */
background:rgba(255,255,255,0.12);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.25);
padding:20px 25px;
border-radius:20px;
text-align:center;
color:white;
font-size:24px;
text-shadow:0 0 10px black;
max-width:85%;
box-shadow:0 0 25px rgba(255,255,255,0.2);
animation:fadeIn 2.5s ease-in-out;
}

/* 📸 PHOTO REVEAL */
.photo-container{
position:absolute;
bottom:-300px;
animation:photoUp 3s ease-out forwards;
display:flex;
justify-content:center;
align-items:center;
}

@keyframes photoUp{
0%{bottom:-300px; opacity:0; transform:scale(0.6);}
100%{bottom:120px; opacity:1; transform:scale(1);}
}

.photo-container img{
width:220px;
height:280px;
object-fit:cover;
border-radius:20px;
border:4px solid white;
box-shadow:0 0 30px rgba(255,255,255,0.6), 0 0 60px #ff4da6;
}

/* ❤️ HEARTS */
.heart{
position:absolute;
font-size:28px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* 🎁 GIFTS */
.gift{
position:absolute;
font-size:28px;
animation:giftFloat linear infinite;
}

@keyframes giftFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh) rotate(360deg);opacity:0;}
}

/* ➜ BUTTON */
.next-btn{
position:absolute;
bottom:20px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff1493;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,0.8);
}

.next-btn:hover{
transform:scale(1.1);
transition:0.3s;
}

</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- 🎂 TITLE -->
<div id="birthdayText">
🎂 Happy Birthday Vichuve 🥹💋🫂
</div>

<!-- 💌 QUOTE (UPDATED TEXT) -->
<div class="quote-box">
Today is June 19, 2026 ✨<br>
My little girl has grown one more year ❤️<br>
Now you are 20 years old, my vichukutti 💋🫂
</div>

<!-- 📸 PHOTO -->
<div class="photo-container">
  <img src="herphoto.jpg" alt="Birthday Girl">
</div>

<!-- ✨ FLOATING LIGHTS -->
<script>
for(let i=0;i<25;i++){
  let light=document.createElement("div");
  light.className="light";
  light.style.left=Math.random()*100+"vw";
  light.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(light);
}
</script>

<!-- ❤️ HEARTS -->
<div class="heart" style="left:5%;animation-duration:7s;">💖</div>
<div class="heart" style="left:15%;animation-duration:9s;">❤️</div>
<div class="heart" style="left:25%;animation-duration:8s;">💗</div>
<div class="heart" style="left:35%;animation-duration:10s;">💖</div>
<div class="heart" style="left:45%;animation-duration:6s;">❤️</div>
<div class="heart" style="left:55%;animation-duration:8s;">💗</div>
<div class="heart" style="left:65%;animation-duration:9s;">💖</div>
<div class="heart" style="left:75%;animation-duration:7s;">❤️</div>
<div class="heart" style="left:85%;animation-duration:10s;">💗</div>

<!-- 🎁 GIFTS -->
<div class="gift" style="left:10%;animation-duration:9s;">🎁</div>
<div class="gift" style="left:20%;animation-duration:7s;">🎀</div>
<div class="gift" style="left:30%;animation-duration:10s;">🎉</div>
<div class="gift" style="left:40%;animation-duration:8s;">🎁</div>
<div class="gift" style="left:50%;animation-duration:11s;">🎀</div>
<div class="gift" style="left:60%;animation-duration:7s;">🎁</div>
<div class="gift" style="left:70%;animation-duration:9s;">🎉</div>
<div class="gift" style="left:80%;animation-duration:8s;">🎁</div>

<!-- ➜ NEXT BUTTON -->
<button class="next-btn" onclick="window.location.href='page3.html'">
Next Surprise ➜
</button>

<!-- 🎵 MUSIC SCRIPT -->
<script>
window.addEventListener("load", () => {
  const music = document.getElementById("bgmusic");

  music.play().catch(()=> {
    document.addEventListener("click", ()=>music.play(), {once:true});
  });
});
</script>

</body>
</html>
