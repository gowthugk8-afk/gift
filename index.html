<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5ea8,#ff89c2,#ffd6e8);
position:relative;
}

/* Hearts */
.heart{
position:absolute;
font-size:30px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Roses */
.rose{
position:absolute;
font-size:25px;
animation:fall 10s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* Teddy Bears */
.teddy{
position:absolute;
font-size:90px;
}

.left{
left:20px;
bottom:20px;
}

.right{
right:20px;
bottom:20px;
}

/* Gift */
.gift-container{
text-align:center;
cursor:pointer;
z-index:10;
}

.gift{
position:relative;
width:280px;
height:220px;
margin:auto;
transition:1s;
}

/* Glow */
.glow{
position:absolute;
width:350px;
height:350px;
top:-140px;
left:-35px;
background:radial-gradient(circle,
rgba(255,255,180,1) 0%,
rgba(255,215,0,0.8) 20%,
rgba(255,215,0,0) 70%);
opacity:0;
transition:1s;
z-index:1;
}

/* Lid */
.lid{
position:absolute;
top:0;
left:0;
width:280px;
height:60px;
background:linear-gradient(45deg,#ff003c,#ff4d6d);
border-radius:15px;
z-index:5;
transition:1s;
}

/* Box */
.box{
position:absolute;
bottom:0;
width:280px;
height:180px;
background:linear-gradient(45deg,#ff1744,#ff4d6d);
border-radius:0 0 15px 15px;
overflow:hidden;
}

/* Ribbons */
.ribbon-v{
position:absolute;
left:120px;
width:40px;
height:100%;
background:gold;
}

.ribbon-h{
position:absolute;
top:20px;
width:100%;
height:25px;
background:gold;
}

.bow{
position:absolute;
top:-35px;
left:95px;
font-size:70px;
z-index:10;
}

.text{
margin-top:40px;
font-size:30px;
font-weight:bold;
color:white;
text-shadow:0 0 10px black;
}

.sub{
margin-top:10px;
font-size:18px;
color:white;
}

.burst-heart{
position:absolute;
font-size:30px;
opacity:0;
}

</style>
</head>

<body>

<!-- Hearts -->
<div class="heart" style="left:5%;animation-duration:7s;">❤️</div>
<div class="heart" style="left:15%;animation-duration:9s;">💕</div>
<div class="heart" style="left:25%;animation-duration:8s;">💖</div>
<div class="heart" style="left:35%;animation-duration:10s;">❤️</div>
<div class="heart" style="left:45%;animation-duration:6s;">💕</div>
<div class="heart" style="left:55%;animation-duration:9s;">💖</div>
<div class="heart" style="left:65%;animation-duration:8s;">❤️</div>
<div class="heart" style="left:75%;animation-duration:7s;">💕</div>
<div class="heart" style="left:85%;animation-duration:10s;">💖</div>

<!-- Roses -->
<div class="rose" style="left:10%;">🌹</div>
<div class="rose" style="left:30%;animation-duration:12s;">🌹</div>
<div class="rose" style="left:50%;animation-duration:9s;">🌹</div>
<div class="rose" style="left:70%;animation-duration:11s;">🌹</div>
<div class="rose" style="left:90%;animation-duration:10s;">🌹</div>

<!-- Teddy Bears -->
<div class="teddy left">🧸</div>
<div class="teddy right">🧸</div>

<!-- Gift -->
<div class="gift-container" onclick="openGift()">

<div class="gift" id="gift">

<div class="glow" id="glow"></div>

<div class="lid" id="lid">
<div class="ribbon-h"></div>
</div>

<div class="box">
<div class="ribbon-v"></div>
<div class="ribbon-h"></div>
</div>

<div class="bow">🎀</div>

</div>

<div class="text">Tap The Gift ❤️</div>
<div class="sub">A Special Birthday Surprise Awaits...</div>

</div>

<script>

function openGift(){

let gift=document.getElementById("gift");
let lid=document.getElementById("lid");
let glow=document.getElementById("glow");

gift.style.transform="scale(1.35)";

setTimeout(()=>{

lid.style.transform="translateY(-140px) rotate(-15deg)";
glow.style.opacity="1";

},1000);

setTimeout(()=>{

for(let i=0;i<20;i++){

let h=document.createElement("div");
h.innerHTML="❤️";
h.className="burst-heart";

h.style.left=(window.innerWidth/2)+"px";
h.style.top=(window.innerHeight/2)+"px";

document.body.appendChild(h);

let x=(Math.random()*600)-300;
let y=(Math.random()*-500);

h.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:2000
});

}

},1500);

setTimeout(()=>{

document.body.style.transition="1s";
document.body.style.opacity="0";

},3500);

setTimeout(()=>{

window.location.href="page2.html";

},4500);

}

</script>

</body>
</html>
